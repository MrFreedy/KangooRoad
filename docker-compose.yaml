version: "3.8"

services:
  api:
    container_name: trav3il-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - trav3il-network
  db:
    container_name: trav3il-db
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    labels:
      com.datadoghq.ad.logs: '[{"source": "postgresql", "service": "trav3il-db"}]'
    networks:
      - trav3il-network
volumes:
  postgres_data:

networks:
  trav3il-network:
    external: true